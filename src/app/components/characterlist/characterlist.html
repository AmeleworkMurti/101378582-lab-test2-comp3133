<app-characterfilter (charactersFiltered)="characters.set($event)"></app-characterfilter>
<h2>Harry Potter Characters</h2>

@if (loading()) {
  <p>Loading...</p>
} @else {

  <div class="grid">
    @for (char of characters(); track char.id) {

      <div class="card"  (click)="goToDetails(char.id)">
        <img [src]="char.image" alt="{{ char.name }}" />
        <h3>{{ char.name }}</h3>
        <p>{{ char.house || 'No House' }}</p>
      </div>

    }
  </div>

}
